<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Mom 💐</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe3ec, #fff4e6, #fef6ff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    .card {
      width: min(90%, 700px);
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
      position: relative;
      z-index: 2;
    }

    h1 {
      margin-top: 0;
      color: #d94f7d;
      font-size: 2.2rem;
    }

    p {
      color: #6b5b66;
      font-size: 1.05rem;
      margin-bottom: 24px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    }

    button:hover {
      transform: translateY(-2px) scale(1.03);
    }

    .reasonBtn {
      background: #ff7ea8;
      color: white;
    }

    .complimentBtn {
      background: #ffb86b;
      color: white;
    }

    #result {
      margin-top: 28px;
      min-height: 80px;
      font-size: 1.35rem;
      line-height: 1.5;
      color: #4e3e47;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.55);
    }

    .flower {
      position: fixed;
      bottom: -30px;
      pointer-events: none;
      animation: floatUp linear forwards;
      z-index: 1;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      to {
        transform: translateY(-110vh) rotate(240deg);
        opacity: 0;
      }
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 16px;
      top: -20px;
      pointer-events: none;
      opacity: 0.95;
      animation: confettiFall linear forwards;
      z-index: 3;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) translateX(var(--drift)) rotate(720deg);
        opacity: 0;
      }
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.9rem;
      color: #8c7b84;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Happy Mother’s Day 💐</h1>
    <p>Tap a button for something sweet and fun.</p>

    <div class="buttons">
      <button class="reasonBtn" onclick="generateReason()">💖 Reason I Love You</button>
      <button class="complimentBtn" onclick="generateCompliment()">🤖 Compliment Machine</button>
    </div>

    <div id="result">You deserve all the flowers in the world 🌸</div>
    <div class="footer-note">Made with love</div>
  </div>

  <script>
    const reasons = [
      "You always know how to make everything better.",
      "Your hugs fix bad days instantly.",
      "You taught me kindness and patience.",
      "You always believe in me.",
      "You make the best food in the universe.",
      "You somehow know when something is wrong.",
      "You make ordinary days feel special.",
      "You are always there when I need you.",
      "You give the best advice.",
      "You make home feel like home.",
      "You are one of the strongest people I know.",
      "You care so deeply about everyone around you."
    ];

    const adjectives = [
      "legendary",
      "world-class",
      "elite",
      "iconic",
      "five-star",
      "certified amazing",
      "award-winning",
      "top-tier"
    ];

    const roles = [
      "hug provider",
      "life advisor",
      "chef",
      "problem solver",
      "support system",
      "family hero",
      "professional multitasker",
      "queen of kindness"
    ];

    const stats = [
      "97% better than average humans.",
      "ranked #1 in the family league.",
      "in the top 1% of moms worldwide.",
      "scientifically proven to be amazing.",
      "breaking records since day one.",
      "operating at maximum kindness capacity.",
      "deserving of infinite flowers and snacks.",
      "officially too wonderful to measure."
    ];

    const flowers = ["🌸", "🌷", "🌼", "💐", "🌺"];

    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateReason() {
      document.getElementById("result").textContent = randomItem(reasons);
      spawnFlowers(10);
      burstConfetti(28);
    }

    function generateCompliment() {
      const text = `Mom, you are a ${randomItem(adjectives)} ${randomItem(roles)}, ${randomItem(stats)}`;
      document.getElementById("result").textContent = text;
      spawnFlowers(10);
      burstConfetti(28);
    }

    function spawnFlowers(count = 8) {
      for (let i = 0; i < count; i++) {
        const flower = document.createElement("div");
        flower.className = "flower";
        flower.textContent = randomItem(flowers);
        flower.style.left = Math.random() * 100 + "vw";
        flower.style.fontSize = 18 + Math.random() * 22 + "px";
        flower.style.animationDuration = 4 + Math.random() * 3 + "s";
        document.body.appendChild(flower);

        setTimeout(() => flower.remove(), 7000);
      }
    }

    function burstConfetti(count = 24) {
      for (let i = 0; i < count; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";

        const colors = [
          "#ff7ea8",
          "#ffb86b",
          "#ffd93d",
          "#95e1d3",
          "#cba6f7",
          "#f38ba8"
        ];

        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = randomItem(colors);
        piece.style.animationDuration = 2.5 + Math.random() * 2 + "s";
        piece.style.setProperty("--drift", (Math.random() * 160 - 80) + "px");
        piece.style.borderRadius = Math.random() > 0.5 ? "2px" : "50%";
        piece.style.width = 8 + Math.random() * 8 + "px";
        piece.style.height = 10 + Math.random() * 12 + "px";

        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 5000);
      }
    }
  </script>
</body>
</html>
